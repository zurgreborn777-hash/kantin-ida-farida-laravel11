[phases.setup]
nixPkgs = ['php82', 'php82Extensions.pdo', 'php82Extensions.pdo_mysql', 'php82Extensions.mbstring', 'php82Extensions.xml', 'php82Extensions.curl', 'php82Extensions.zip', 'php82Extensions.gd', 'php82Extensions.tokenizer', 'php82Extensions.bcmath', 'php82Extensions.fileinfo', 'php82Extensions.openssl', 'composer', 'nodejs_18', 'npm-9_x']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader --no-interaction',
    'npm ci'
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:cache',
    'php artisan route:cache',
    'php artisan view:cache'
]

[start]
cmd = 'php artisan migrate --force && php artisan db:seed --force --class=DatabaseSeeder 2>/dev/null || true && php artisan serve --host=0.0.0.0 --port=$PORT'
